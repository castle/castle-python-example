name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Byte-compile sources
        run: python -m py_compile app.py castle_config.py demo_config.py
      - name: Run tests
        run: pytest
