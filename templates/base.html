<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Castle workflows · {{ location }}</title>

	<link rel="icon" type="image/x-icon" href="https://castle.io/favicon-32x32.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link href="/static/styles.css" rel="stylesheet">

	<script src="/static/castle.browser.js"></script>
	<script>
		if (window.Castle && "{{ castle_pk or '' }}") {
			Castle.configure({ pk: "{{ castle_pk or '' }}" });
		}
	</script>
	<script src="/static/app.js" defer></script>
</head>

<body>

	<nav class="navbar">
		<a class="brand" href="/"><span class="dot"></span> Castle <span class="muted" style="font-weight:400">demo</span></a>
		<div class="nav-links">
			{% for demo in demo_list %}
			<a href="/{{ demo['url'] }}">{{ demo['friendly_name'] }}</a>
			{% endfor %}
			<a href="https://github.com/castle/castle-python-example" target="_blank" rel="noopener">GitHub</a>
			<a href="https://docs.castle.io" target="_blank" rel="noopener">Docs</a>
		</div>
	</nav>

	<main class="container">
		{% block content %}{% endblock %}
	</main>

	{% block scripts %}{% endblock %}

</body>

</html>
